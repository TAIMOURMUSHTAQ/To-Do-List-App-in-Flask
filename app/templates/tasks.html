{% extends 'base.html' %}
{% block title %}Tasks{% endblock %}
{% block content %}
<div class="task-box">
    <h1>Your Tasks</h1>
    <form action="{{ url_for('tasks.add_task') }}" method="post" class="form">
        <input type="text" name="title" id="title" placeholder="New Task" required>
        <button type="submit" class="btn">Add</button>
    </form>

    {% if tasks %}
        <form action="{{ url_for('tasks.clear_tasks') }}" method="post">
            <button type="submit" class="btn btn-clear">Clear All</button>
        </form><br>
        <table class="tasks-table">
            <thead>
                <tr>
                    <th>
                        Task
                    </th>
                    <th>
                        Status
                    </th>
                    <th>
                        Change
                    </th>
                </tr>
            </thead>
            <tbody>
                {% for task in tasks %}
                <tr>
                    <td>
                        {{ loop.index }}
                    </td>
                    <td>
                        {{ task.title }}
                    </td>
                    <td>
                        <span class="badge {{ task.status|lower }}">{{ task.status }}</span>
                    </td>
                    <td>
                        <form action="{{ url_for('tasks.toggle_status', task_id=task.id) }}" method="post">
                            <button type="submit" class="btn-small">Next</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>No Tasks yet...</p>
    {% endif %}
</div>
{% endblock %}
